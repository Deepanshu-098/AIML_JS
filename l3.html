<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }


        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(140deg, #a4bcf9, #053689);
        }







        .Card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 25px;
            border-radius: 18px;
            width: 360px;
            text-align: center;

            border: 1px solid rgba(255, 255, 255, 0.18);

            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
            transition: all 0.35s ease;
        }







        .Card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 35px 65px rgba(0, 0, 0, 0.45);
        }







        .Card h1 {
            margin-bottom: 25px;
            color: #1c2b4a;
            font-weight: 600;
        }


        input {
            width: 100%;
            margin-bottom: 18px;
            padding: 12px;
            border-radius: 10px;
            border: 1.8px solid #96b1f1;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:hover {
            border-color: #4f7cff;
            outline: none;
            box-shadow: 0 0 10px rgba(79, 124, 255, 0.35);
            transform: scale(1.02);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;

            background: linear-gradient(135deg, #6bde6e, #03563a);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
            opacity: 0.95;
        }

       #result {
            margin-top: 22px;
            padding: 14px;
            border-radius: 10px;
            /* background: #e4ecfe; */
            background: linear-gradient(135deg, #eef3ff, #dfe9ff);
            font-size: 18px;    
            font-weight: 600;
            color: #435b8c;
            border: 1px solid #d6e1ff;

            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>
    <div class="Card">
        <h1>Simple Calculator</h1>
        <form action="#">
            <input type="number" id="subjects" placeholder="Number of Subjects">
            <button type="button" onclick="calculate()" class="btn">Result</button>
            <div id="result">Result will be shown here</div>
        </form>
    </div>




    <script>


        function calculate() {
            let subjects = parseInt(document.getElementById("subjects").value);
            let total = 0;

               if (isNaN(subjects) || subjects <= 0) {
                alert("Enter a valid number of subjects.");
                return;
            }
            for (let i = 1; i <= subjects; i++) {
                let marks = parseFloat(prompt(`Enter marks for subject ${i}:`));
                if (isNaN(marks)) {
                    alert("Invalid marks entered.");
                    return;
                }
                total += marks;

            }

          

            // let total = 0;
            let average = total / subjects;
            let grade = "";



            if (average >= 90) {
                grade = "A";
            }
            else if (average >= 80) {
                grade = "B";
            }
            else if (average >= 70) {
                grade = "C";
            }
            else if (average >= 40) {
                grade = "D";
            }


            else {
                grade = "Fail";
            }

         
            let result = document.getElementById("result").innerHTML = 
            "Total Marks: " + total + "<br>Average Marks: " + average.toFixed(2) + "<br>Grade: " + grade;
             
        }

    </script>

</body>

</html>
